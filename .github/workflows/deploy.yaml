# .github/workflows/deploy.yml
name: Build & Deploy Kellner-Rechner

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/kellner

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply updated products ConfigMap
        run: |
          kubectl create configmap preisliste \
            --from-file=products.json=./src/data/products.json \
            --namespace kellner-rechner \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply core deployment manifest
        run: |
          kubectl apply -f core.yaml

      - name: Rollout restart deployment
        run: |
          kubectl rollout restart deployment/kellner-deployment \
            --namespace kellner-rechner

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/kellner-deployment \
            --namespace kellner-rechner \
            --timeout=120s

      - name: Shred kubeconfig
        if: always()
        run: shred -u $HOME/.kube/config
